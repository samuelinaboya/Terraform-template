name: "Terraform Azure Automation"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select the Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      workspace:
        description: "Select the target Azure Workspace"
        required: true
        default: "azure-dev"
        type: choice
        options:
          - azure-dev
          - azure-prod

jobs:
  terraform:
    name: "Azure TF ${{ github.event.inputs.action }} (${{ github.event.inputs.workspace }})"
    runs-on: ubuntu-latest

    env:
      TF_WORKSPACE: ${{ github.event.inputs.workspace }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false
