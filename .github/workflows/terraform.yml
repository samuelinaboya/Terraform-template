name: "Terraform Multi-Cloud Automation"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select the Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      image_tag:
        description: "Container image tag (optional)"
        required: false
        default: "latest"
        type: string
      directory:
        description: "Root directory of the Terraform configuration (e.g., gcp/ or azure/)"
        required: false
        default: "."
        type: string
      workspace:
        description: "Select the target Terraform Workspace"
        required: true
        default: "gcp-prod"
        type: choice
        options:
          - gcp-prod
          - gcp-dev
          - azure-prod
          - azure-dev

jobs:
  terraform:
    name: "TF ${{ github.event.inputs.action }} (${{ github.event.inputs.workspace }})"
    runs-on: ubuntu-latest

    env:
      TF_VAR_image_tag: ${{ github.event.inputs.image_tag }}
      TF_WORKSPACE: ${{ github.event.inputs.workspace }}

    defaults:
      run:
        working-directory: ${{ github.event.inputs.directory }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false
